version: '3.8'

x-agent-common: &agent-common
  image: mvx-agent:latest
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  env_file:
    - .env
  command: >
    sh -c '
      export OPENCLAW_DISABLE_BONJOUR=1
      sed -i "s/\"agentName\": \".*\"/\"agentName\": \"$$AGENT_NAME\"/g" /home/node/.openclaw/workspace/skills/multiversx/moltbot-starter-kit/agent.config.json &&
      sed -i "s/\"agentName\": \".*\"/\"agentName\": \"$$AGENT_NAME\"/g" /home/node/.openclaw/workspace/skills/multiversx/moltbot-starter-kit/manifest.config.json &&
      sed -i "s|MULTIVERSX_API_URL=.*|MULTIVERSX_API_URL=$$MULTIVERSX_API_URL|g" /home/node/.openclaw/workspace/skills/multiversx/moltbot-starter-kit/.env &&
      sed -i "s|MULTIVERSX_CHAIN_ID=.*|MULTIVERSX_CHAIN_ID=$$MULTIVERSX_CHAIN_ID|g" /home/node/.openclaw/workspace/skills/multiversx/moltbot-starter-kit/.env &&
      sed -i "s|IDENTITY_REGISTRY_ADDRESS=.*|IDENTITY_REGISTRY_ADDRESS=$$IDENTITY_REGISTRY_ADDRESS|g" /home/node/.openclaw/workspace/skills/multiversx/moltbot-starter-kit/.env &&
      cd /app &&
      if [ -n "$$CLAW_TELEGRAM_BOT_TOKEN" ] && [ "$$AGENT_NAME" = "mvx-agent-1" ]; then node openclaw.mjs config set channels.telegram.botToken "$$CLAW_TELEGRAM_BOT_TOKEN" && node openclaw.mjs config set channels.telegram.allowFrom "[\"*\"]" --strict-json && node openclaw.mjs config set channels.telegram.dmPolicy open; fi &&
      if [ -n "$$OPENCLAW_MODEL" ]; then node openclaw.mjs config set agents.defaults.model.primary "$$OPENCLAW_MODEL"; fi &&
      if [ -n "$$OPENCLAW_GATEWAY_TOKEN" ]; then node openclaw.mjs config set gateway.auth.mode token && node openclaw.mjs config set gateway.auth.token "$$OPENCLAW_GATEWAY_TOKEN"; fi &&
      exec node openclaw.mjs gateway --allow-unconfigured
    '

services:
  agent-1:  
    <<: *agent-common
    container_name: mvx-agent-1
    ports:
      - "3001:3001"
      - "3002:3002"
      - "18789:18789"
    environment:
      - AGENT_NAME=mvx-agent-1
    volumes:
      - ./wallets/mvx-agent-1.pem:/home/node/.openclaw/workspace/skills/multiversx/moltbot-starter-kit/wallet.pem

  agent-2:
    <<: *agent-common
